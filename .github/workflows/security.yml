name: Security

on:
  push:
    branches: [main, master]
    paths-ignore:
      - "docs/**"
      - "**/*.md"
      - ".github/ISSUE_TEMPLATE/**"
  pull_request:
    branches: [main, master]
    paths-ignore:
      - "docs/**"
      - "**/*.md"
      - ".github/ISSUE_TEMPLATE/**"
  schedule:
    # Weekly scan: Mondays at 07:00 UTC. Catches newly disclosed
    # vulnerabilities in pinned dependencies between code changes.
    - cron: "0 7 * * 1"

# Cancel in-progress runs for the same branch/PR to avoid wasting resources.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Default: read-only. Individual jobs elevate only what they need.
permissions:
  contents: read

# Opt into Node.js 24 for JavaScript actions ahead of the Node 20 deprecation.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run govulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    permissions:
      # Required to upload analysis results to the code-scanning dashboard.
      security-events: write
      # Needed by CodeQL to read the source and workflow metadata.
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: go
          build-mode: autobuild

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:go"
