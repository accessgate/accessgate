name: CI

on:
  push:
    branches: [main, master]
    tags: ["v*"]
    paths-ignore:
      - "docs/**"
      - "**/*.md"
      - ".github/ISSUE_TEMPLATE/**"
  pull_request:
    branches: [main, master]
    paths-ignore:
      - "docs/**"
      - "**/*.md"
      - ".github/ISSUE_TEMPLATE/**"

# Cancel in-progress runs for the same branch/PR to avoid wasting resources.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Default: read-only. Release job elevates as needed.
permissions:
  contents: read

# Opt into Node.js 24 for JavaScript actions ahead of the Node 20 deprecation.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install buf
        uses: bufbuild/buf-setup-action@v1

      - name: Lint proto definitions
        run: make proto-lint

      - name: Check proto breaking changes
        # Only compare against main when running on a PR; skip on direct pushes to main.
        if: github.event_name == 'pull_request'
        run: |
          git fetch origin main:main
          make proto-breaking

      - name: Generate protobuf code
        run: make proto-generate

      - name: Verify generated proto files are up to date
        run: git diff --exit-code proto/gen/

      - name: Verify go.mod tidy
        run: |
          go mod tidy
          git diff --exit-code

      - name: Verify config schemas are up to date
        # Regenerate JSON Schemas from the Go config structs and fail if the
        # committed schemas/ are stale (drift between structs and schemas).
        run: |
          make schema
          git diff --exit-code schemas/

      - name: Validate example configs
        # Validate each committed example config against its generated schema and
        # the runtime Load+Validate rules. Required secrets are injected via env
        # (env overrides file values) since the examples ship with empty secrets.
        env:
          OIDC_CLIENT_SECRET: ci-example-oidc-client-secret
          COOKIE_SIGNING_SECRET: ci-example-cookie-signing-secret
        run: |
          make validate-config CONFIG_PATH=configs/auth.example.json BINARY=auth
          make validate-config CONFIG_PATH=configs/auth.example.yaml BINARY=auth
          make validate-config CONFIG_PATH=configs/proxy.example.json BINARY=proxy
          make validate-config CONFIG_PATH=configs/proxy.example.yaml BINARY=proxy

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./... -count=1 -race -short

      - name: Coverage
        run: go test ./... -count=1 -short -coverprofile=coverage.out -covermode=atomic

      - name: Coverage gate
        # Fail the build if total statement coverage drops below the threshold.
        # COVERAGE_THRESHOLD is the single source of truth: set a few points
        # below the current total so it ratchets up over time without flapping.
        # Measured total at introduction: 43.9% -> gate at 40%.
        env:
          COVERAGE_THRESHOLD: "40.0"
        run: |
          total="$(go tool cover -func=coverage.out | tail -1 | awk '{print $NF}' | tr -d '%')"
          echo "Total coverage: ${total}% (threshold: ${COVERAGE_THRESHOLD}%)"
          awk -v have="$total" -v want="$COVERAGE_THRESHOLD" 'BEGIN {
            if (have + 0 < want + 0) {
              printf("coverage gate FAILED: %.1f%% < %.1f%%\n", have, want)
              exit 1
            }
            printf("coverage gate passed: %.1f%% >= %.1f%%\n", have, want)
          }'

      - name: Upload coverage
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-out
          path: coverage.out
          if-no-files-found: ignore

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          # golangci-lint-action manages its own cache; disable setup-go caching
          # here to avoid redundant cache entries.
          cache: false

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.3

  # PR-time validation: build BOTH container images (no push) so the
  # checked-in Dockerfiles are exercised on every pull request. Least
  # privilege — no registry credentials, build only. Single-arch (amd64) to
  # keep PRs fast; the release job builds + pushes multi-arch.
  docker-build:
    name: Docker build (PR validation)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build accessgate-auth image (amd64, no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: build/docker/Dockerfile.auth
          platforms: linux/amd64
          push: false
          tags: accessgate-auth:ci

      - name: Build accessgate-proxy image (amd64, no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: build/docker/Dockerfile.proxy
          platforms: linux/amd64
          push: false
          tags: accessgate-proxy:ci

  # PR-time public Go API-diff gate for pkg/** — the Go analogue of the
  # `buf breaking` proto gate and the `make schema` config-drift gate
  # (docs/COMPATIBILITY.md §3). Fails on INCOMPATIBLE changes to the exported
  # surface under pkg/**; additive changes are allowed. Scope is pkg/** only:
  # internal/** is outside the v1 contract and proto/gen/go is already covered
  # by `buf breaking`.
  #
  # The job ALWAYS runs on pull_request so it can be made a required status
  # check; when no pkg/** or go.{mod,sum} files changed it short-circuits to a
  # success (reporting "skipped" in its own log, but a green check to GitHub).
  go-api-diff:
    name: Go API diff (pkg/**)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
    steps:
      # HEAD (PR) checkout. fetch-depth: 0 so we can diff against the merge base.
      - name: Checkout PR head
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          path: head

      # BASE checkout at the PR's target branch, into a separate directory so
      # apidiff can build export data from each side independently.
      - name: Checkout base (${{ github.base_ref }})
        uses: actions/checkout@v6
        with:
          ref: ${{ github.base_ref }}
          fetch-depth: 0
          path: base

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: head/go.mod
          cache: true

      # Fast skip: only run the (relatively heavy) apidiff comparison when the
      # PR actually touches pkg/** or the module files. We diff the PR head
      # against the merge base with the target branch. On no relevant change the
      # job still exits 0, so a required check stays green.
      - name: Detect pkg/** or go.mod changes
        id: changes
        working-directory: head
        run: |
          base_sha="$(git merge-base "origin/${{ github.base_ref }}" HEAD)"
          echo "merge base: ${base_sha}"
          if git diff --name-only "${base_sha}" HEAD \
               | grep -E '^(pkg/|go\.mod$|go\.sum$)' > /dev/null; then
            echo "relevant=true" >> "$GITHUB_OUTPUT"
          else
            echo "relevant=false" >> "$GITHUB_OUTPUT"
            echo "No pkg/** or go.{mod,sum} changes — API-diff gate skipped (pass)."
          fi

      - name: Run Go API-diff gate
        if: steps.changes.outputs.relevant == 'true'
        run: head/scripts/go-api-diff.sh base head

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [test, lint]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
      # Required to push container images to GHCR (ghcr.io/accessgate/*).
      # Docker Hub pushes authenticate via the DOCKERHUB_USERNAME/DOCKERHUB_TOKEN
      # repo secrets instead of a GitHub permission.
      packages: write
      # Keyless cosign signing (Sigstore/Fulcio) requests an OIDC token from the
      # runner; id-token: write authorizes minting it (#45).
      id-token: write
      # SLSA build provenance attestations are written to the attestation store.
      attestations: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install buf
        uses: bufbuild/buf-setup-action@v1

      - name: Generate protobuf code
        run: make proto-generate

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./... -count=1 -short

      # GoReleaser's dockers:/docker_manifests: need QEMU (cross-arch) and
      # buildx; GHCR login lets it push the images and manifests (ADR-0005).
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Fail fast if the Docker Hub credentials are missing. GoReleaser publishes
      # the GitHub Release and pushes GHCR images BEFORE the docker.io pushes, so
      # a credential failure mid-run would leave a half-published release. Both
      # registry logins run before GoReleaser for the same reason.
      - name: Verify Docker Hub credentials present
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          test -n "$DOCKERHUB_USERNAME" || { echo "::error::DOCKERHUB_USERNAME secret is missing"; exit 1; }
          test -n "$DOCKERHUB_TOKEN" || { echo "::error::DOCKERHUB_TOKEN secret is missing"; exit 1; }

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Supply-chain hardening (#45). cosign performs keyless signing of the
      # checksums file and the pushed images (GoReleaser signs:/docker_signs:);
      # syft generates the per-archive SPDX SBOMs (GoReleaser sboms:). Both must
      # be on PATH before GoReleaser runs.
      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Install syft (SBOM generator)
        uses: anchore/sbom-action/download-syft@v0

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # SLSA build provenance (#45). GoReleaser has already published the
      # release and pushed the images; attest the built binaries (dist/) and the
      # pushed image manifests so consumers can verify with `gh attestation
      # verify` / `cosign verify-attestation`.
      - name: Attest build provenance for release binaries
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: "dist/**/accessgate-*"

      # Resolve the published multi-arch manifest digests so we can attest
      # provenance against an immutable digest (not a moving tag). Each registry
      # is resolved independently — the digests are expected to match (the images
      # are built once and tagged for both), but we never rely on that. The
      # version tag is the leading-`v`-stripped ref name (GoReleaser's .Version).
      - name: Resolve pushed image digests
        id: image_digests
        run: |
          version="${GITHUB_REF_NAME#v}"
          # buildx imagetools (already set up + authenticated to both registries)
          # reports the multi-arch manifest digest for each published version tag.
          auth_digest="$(docker buildx imagetools inspect \
            "ghcr.io/accessgate/accessgate-auth:${version}" \
            --format '{{json .Manifest.Digest}}' | tr -d '"')"
          proxy_digest="$(docker buildx imagetools inspect \
            "ghcr.io/accessgate/accessgate-proxy:${version}" \
            --format '{{json .Manifest.Digest}}' | tr -d '"')"
          dh_auth_digest="$(docker buildx imagetools inspect \
            "docker.io/accessgate/accessgate-auth:${version}" \
            --format '{{json .Manifest.Digest}}' | tr -d '"')"
          dh_proxy_digest="$(docker buildx imagetools inspect \
            "docker.io/accessgate/accessgate-proxy:${version}" \
            --format '{{json .Manifest.Digest}}' | tr -d '"')"
          echo "auth_digest=${auth_digest}" >> "$GITHUB_OUTPUT"
          echo "proxy_digest=${proxy_digest}" >> "$GITHUB_OUTPUT"
          echo "dh_auth_digest=${dh_auth_digest}" >> "$GITHUB_OUTPUT"
          echo "dh_proxy_digest=${dh_proxy_digest}" >> "$GITHUB_OUTPUT"

      - name: Attest build provenance for accessgate-auth image
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ghcr.io/accessgate/accessgate-auth
          subject-digest: ${{ steps.image_digests.outputs.auth_digest }}
          push-to-registry: true
        if: ${{ steps.image_digests.outputs.auth_digest != '' }}

      - name: Attest build provenance for accessgate-proxy image
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ghcr.io/accessgate/accessgate-proxy
          subject-digest: ${{ steps.image_digests.outputs.proxy_digest }}
          push-to-registry: true
        if: ${{ steps.image_digests.outputs.proxy_digest != '' }}

      # Docker Hub attestations are pushed separately: attestation referrers live
      # in the registry they were pushed to, so the GHCR attestation alone would
      # not serve `gh attestation verify oci://docker.io/...` lookups.
      - name: Attest build provenance for accessgate-auth image (Docker Hub)
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: docker.io/accessgate/accessgate-auth
          subject-digest: ${{ steps.image_digests.outputs.dh_auth_digest }}
          push-to-registry: true
        if: ${{ steps.image_digests.outputs.dh_auth_digest != '' }}

      - name: Attest build provenance for accessgate-proxy image (Docker Hub)
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: docker.io/accessgate/accessgate-proxy
          subject-digest: ${{ steps.image_digests.outputs.dh_proxy_digest }}
          push-to-registry: true
        if: ${{ steps.image_digests.outputs.dh_proxy_digest != '' }}

      # Keep the Docker Hub repo pages from being empty stubs: sync a short
      # overview (and the sidebar short-description) on every release. Docker Hub
      # does not render the OCI source label, so this is the only place the repo
      # page content comes from.
      - name: Sync Docker Hub description (auth)
        uses: peter-evans/dockerhub-description@v5
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: accessgate/accessgate-auth
          readme-filepath: ./build/docker/dockerhub-overview-auth.md
          short-description: "AccessGate OIDC auth service (login/session lifecycle)"

      - name: Sync Docker Hub description (proxy)
        uses: peter-evans/dockerhub-description@v5
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: accessgate/accessgate-proxy
          readme-filepath: ./build/docker/dockerhub-overview-proxy.md
          short-description: "AccessGate identity-aware proxy (policy enforcement)"
