name: CI

on:
  push:
    branches: [main, master]
    tags: ["v*"]
    paths-ignore:
      - "docs/**"
      - "**/*.md"
      - ".github/ISSUE_TEMPLATE/**"
  pull_request:
    branches: [main, master]
    paths-ignore:
      - "docs/**"
      - "**/*.md"
      - ".github/ISSUE_TEMPLATE/**"

# Cancel in-progress runs for the same branch/PR to avoid wasting resources.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Default: read-only. Release job elevates as needed.
permissions:
  contents: read

# Opt into Node.js 24 for JavaScript actions ahead of the Node 20 deprecation.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install buf
        uses: bufbuild/buf-setup-action@v1

      - name: Lint proto definitions
        run: make proto-lint

      - name: Check proto breaking changes
        # Only compare against main when running on a PR; skip on direct pushes to main.
        if: github.event_name == 'pull_request'
        run: |
          git fetch origin main:main
          make proto-breaking

      - name: Generate protobuf code
        run: make proto-generate

      - name: Verify generated proto files are up to date
        run: git diff --exit-code proto/gen/

      - name: Verify go.mod tidy
        run: |
          go mod tidy
          git diff --exit-code

      - name: Verify config schemas are up to date
        # Regenerate JSON Schemas from the Go config structs and fail if the
        # committed schemas/ are stale (drift between structs and schemas).
        run: |
          make schema
          git diff --exit-code schemas/

      - name: Validate example configs
        # Validate each committed example config against its generated schema and
        # the runtime Load+Validate rules. Required secrets are injected via env
        # (env overrides file values) since the examples ship with empty secrets.
        env:
          OIDC_CLIENT_SECRET: ci-example-oidc-client-secret
          COOKIE_SIGNING_SECRET: ci-example-cookie-signing-secret
        run: |
          make validate-config CONFIG_PATH=configs/auth.example.json BINARY=auth
          make validate-config CONFIG_PATH=configs/auth.example.yaml BINARY=auth
          make validate-config CONFIG_PATH=configs/proxy.example.json BINARY=proxy
          make validate-config CONFIG_PATH=configs/proxy.example.yaml BINARY=proxy

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./... -count=1 -race -short

      - name: Coverage
        run: go test ./... -count=1 -short -coverprofile=coverage.out -covermode=atomic

      - name: Coverage gate
        # Fail the build if total statement coverage drops below the threshold.
        # COVERAGE_THRESHOLD is the single source of truth: set a few points
        # below the current total so it ratchets up over time without flapping.
        # Measured total at introduction: 43.9% -> gate at 40%.
        env:
          COVERAGE_THRESHOLD: "40.0"
        run: |
          total="$(go tool cover -func=coverage.out | tail -1 | awk '{print $NF}' | tr -d '%')"
          echo "Total coverage: ${total}% (threshold: ${COVERAGE_THRESHOLD}%)"
          awk -v have="$total" -v want="$COVERAGE_THRESHOLD" 'BEGIN {
            if (have + 0 < want + 0) {
              printf("coverage gate FAILED: %.1f%% < %.1f%%\n", have, want)
              exit 1
            }
            printf("coverage gate passed: %.1f%% >= %.1f%%\n", have, want)
          }'

      - name: Upload coverage
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-out
          path: coverage.out
          if-no-files-found: ignore

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          # golangci-lint-action manages its own cache; disable setup-go caching
          # here to avoid redundant cache entries.
          cache: false

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.3

  # PR-time validation: build BOTH container images (no push) so the
  # checked-in Dockerfiles are exercised on every pull request. Least
  # privilege — no registry credentials, build only. Single-arch (amd64) to
  # keep PRs fast; the release job builds + pushes multi-arch.
  docker-build:
    name: Docker build (PR validation)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build accessgate-auth image (amd64, no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: build/docker/Dockerfile.auth
          platforms: linux/amd64
          push: false
          tags: accessgate-auth:ci

      - name: Build accessgate-proxy image (amd64, no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: build/docker/Dockerfile.proxy
          platforms: linux/amd64
          push: false
          tags: accessgate-proxy:ci

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [test, lint]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
      # Required to push container images to GHCR (ghcr.io/accessgate/*).
      packages: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install buf
        uses: bufbuild/buf-setup-action@v1

      - name: Generate protobuf code
        run: make proto-generate

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./... -count=1 -short

      # GoReleaser's dockers:/docker_manifests: need QEMU (cross-arch) and
      # buildx; GHCR login lets it push the images and manifests (ADR-0005).
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
