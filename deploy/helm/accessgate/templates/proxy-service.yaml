{{- if .Values.proxy.enabled -}}
{{- $component := "proxy" -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "accessgate.componentFullname" (dict "context" . "component" $component) }}
  labels:
    {{- include "accessgate.componentLabels" (dict "context" . "component" $component) | nindent 4 }}
  {{- with (mergeOverwrite (deepCopy .Values.commonAnnotations) .Values.proxy.service.annotations) }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.proxy.service.type }}
  selector:
    {{- include "accessgate.componentSelectorLabels" (dict "context" . "component" $component) | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.proxy.service.port }}
      targetPort: http
      protocol: TCP
    {{- if .Values.proxy.grpc.enabled }}
    - name: grpc
      port: {{ .Values.proxy.grpc.port }}
      targetPort: grpc
      protocol: TCP
    {{- end }}
{{- end }}
