{{- if not .Values.secrets.existingSecret -}}
{{- if not .Values.secrets.create.cookieSigningSecret -}}
{{- fail "secrets.create.cookieSigningSecret is required (COOKIE_SIGNING_SECRET) unless secrets.existingSecret is set. Generate one with: openssl rand -hex 32" -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "accessgate.secretName" . }}
  labels:
    {{- include "accessgate.labels" . | nindent 4 }}
  {{- with .Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
type: Opaque
stringData:
  {{ .Values.secrets.secretKeys.cookieSigningSecret }}: {{ .Values.secrets.create.cookieSigningSecret | quote }}
  {{- with .Values.secrets.create.oidcClientSecret }}
  {{ $.Values.secrets.secretKeys.oidcClientSecret }}: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.create.adminSecret }}
  {{ $.Values.secrets.secretKeys.adminSecret }}: {{ . | quote }}
  {{- end }}
{{- end }}
