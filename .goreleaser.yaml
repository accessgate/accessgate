# GoReleaser config for accessgate: OS/arch archives plus multi-arch container
# images (ADR-0005). Images are built from the checked-in multi-stage
# Dockerfiles in build/docker/ and published to GHCR (canonical) and Docker Hub
# (mirror) on v* tags. Each per-arch image is built once and tagged for both
# registries, so the digests are identical across ghcr.io and docker.io.
version: 2

project_name: accessgate

builds:
  - id: accessgate-auth
    main: ./cmd/accessgate-auth
    binary: accessgate-auth
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
  - id: accessgate-proxy
    main: ./cmd/accessgate-proxy
    binary: accessgate-proxy
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]

archives:
  - id: default
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

# Supply-chain hardening (#45): generate SBOMs, keyless-sign the checksums file
# and the published GHCR images, and (in CI) attach SLSA build provenance. All
# signing is keyless (Sigstore / Fulcio + Rekor via GitHub OIDC) — there are no
# private keys to manage or rotate.

# SBOM generation: one SPDX-JSON SBOM per archive, produced by syft and uploaded
# as release artifacts alongside the archives. GoReleaser invokes the local
# `syft` binary (installed in the release job).
sboms:
  - id: archive-sbom
    artifacts: archive
    documents:
      - "{{ .ArtifactName }}.sbom.json"

# Keyless cosign signature of the checksums file. Signing the checksums file
# transitively covers every archive (each archive's hash is in checksums.txt),
# so a single signature anchors the whole release. cosign uploads the signing
# certificate to Rekor; we publish the detached signature (.sig) and the
# short-lived certificate (.pem) as release artifacts for offline verification.
signs:
  - id: checksum-keyless
    cmd: cosign
    artifacts: checksum
    # signing_args note: ${artifact}/${signature}/${certificate} are expanded by
    # GoReleaser. --yes accepts the Sigstore TOS non-interactively; the OIDC
    # token is supplied by the GitHub Actions runner (id-token: write).
    signature: "${artifact}.sig"
    certificate: "${artifact}.pem"
    args:
      - "sign-blob"
      - "--oidc-provider=github-actions"
      - "--output-signature=${signature}"
      - "--output-certificate=${certificate}"
      - "${artifact}"
      - "--yes"
    output: true

# Keyless cosign signature of the published container images. Each image and
# manifest is signed by digest (cosign resolves ${artifact} to the pushed
# ref); the signature is stored as an OCI artifact next to the image in the
# registry it was pushed to (GHCR and Docker Hub alike — `artifacts: all`
# covers every pushed image and manifest in both registries).
docker_signs:
  - id: image-keyless
    cmd: cosign
    artifacts: all
    args:
      - "sign"
      - "--oidc-provider=github-actions"
      - "${artifact}@${digest}"
      - "--yes"
    output: true

# Container images, one per binary, built per-arch from the multi-stage
# Dockerfiles and joined into a single multi-arch manifest below.
#
# The Dockerfiles build from source (golang:1.26.4 -> distroless/static:nonroot)
# using BuildKit TARGETOS/TARGETARCH, so each per-arch image is produced via
# `docker buildx build --platform linux/<arch>`. dockerfile/use=buildx requires
# buildx + QEMU set up in the release job (see .github/workflows/ci.yaml).
dockers:
  # --- accessgate-auth ---
  - id: auth-amd64
    use: buildx
    goos: linux
    goarch: amd64
    dockerfile: build/docker/Dockerfile.auth
    # The Dockerfile builds from source, but GoReleaser's docker build context
    # contains only prebuilt binaries by default. extra_files copies the source
    # trees `go build ./cmd/...` needs into the context so the builder stage can
    # compile. (proto/gen is committed, so no codegen is required at image time.)
    extra_files:
      - go.mod
      - go.sum
      - cmd
      - internal
      - pkg
      - proto
    image_templates:
      - "ghcr.io/accessgate/accessgate-auth:{{ .Version }}-amd64"
      - "docker.io/accessgate/accessgate-auth:{{ .Version }}-amd64"
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.title=accessgate-auth"
      - "--label=org.opencontainers.image.description=AccessGate auth service"
      - "--label=org.opencontainers.image.source=https://github.com/accessgate/accessgate"
      - "--label=org.opencontainers.image.url=https://github.com/accessgate/accessgate"
      - "--label=org.opencontainers.image.documentation=https://github.com/accessgate/accessgate"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.created={{ .Date }}"
      - "--label=org.opencontainers.image.licenses=Apache-2.0"
  - id: auth-arm64
    use: buildx
    goos: linux
    goarch: arm64
    dockerfile: build/docker/Dockerfile.auth
    extra_files:
      - go.mod
      - go.sum
      - cmd
      - internal
      - pkg
      - proto
    image_templates:
      - "ghcr.io/accessgate/accessgate-auth:{{ .Version }}-arm64"
      - "docker.io/accessgate/accessgate-auth:{{ .Version }}-arm64"
    build_flag_templates:
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.title=accessgate-auth"
      - "--label=org.opencontainers.image.description=AccessGate auth service"
      - "--label=org.opencontainers.image.source=https://github.com/accessgate/accessgate"
      - "--label=org.opencontainers.image.url=https://github.com/accessgate/accessgate"
      - "--label=org.opencontainers.image.documentation=https://github.com/accessgate/accessgate"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.created={{ .Date }}"
      - "--label=org.opencontainers.image.licenses=Apache-2.0"
  # --- accessgate-proxy ---
  - id: proxy-amd64
    use: buildx
    goos: linux
    goarch: amd64
    dockerfile: build/docker/Dockerfile.proxy
    extra_files:
      - go.mod
      - go.sum
      - cmd
      - internal
      - pkg
      - proto
    image_templates:
      - "ghcr.io/accessgate/accessgate-proxy:{{ .Version }}-amd64"
      - "docker.io/accessgate/accessgate-proxy:{{ .Version }}-amd64"
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.title=accessgate-proxy"
      - "--label=org.opencontainers.image.description=AccessGate proxy service"
      - "--label=org.opencontainers.image.source=https://github.com/accessgate/accessgate"
      - "--label=org.opencontainers.image.url=https://github.com/accessgate/accessgate"
      - "--label=org.opencontainers.image.documentation=https://github.com/accessgate/accessgate"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.created={{ .Date }}"
      - "--label=org.opencontainers.image.licenses=Apache-2.0"
  - id: proxy-arm64
    use: buildx
    goos: linux
    goarch: arm64
    dockerfile: build/docker/Dockerfile.proxy
    extra_files:
      - go.mod
      - go.sum
      - cmd
      - internal
      - pkg
      - proto
    image_templates:
      - "ghcr.io/accessgate/accessgate-proxy:{{ .Version }}-arm64"
      - "docker.io/accessgate/accessgate-proxy:{{ .Version }}-arm64"
    build_flag_templates:
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.title=accessgate-proxy"
      - "--label=org.opencontainers.image.description=AccessGate proxy service"
      - "--label=org.opencontainers.image.source=https://github.com/accessgate/accessgate"
      - "--label=org.opencontainers.image.url=https://github.com/accessgate/accessgate"
      - "--label=org.opencontainers.image.documentation=https://github.com/accessgate/accessgate"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.created={{ .Date }}"
      - "--label=org.opencontainers.image.licenses=Apache-2.0"

# Multi-arch manifests joining the per-arch images, plus a moving "latest".
docker_manifests:
  - name_template: "ghcr.io/accessgate/accessgate-auth:{{ .Version }}"
    image_templates:
      - "ghcr.io/accessgate/accessgate-auth:{{ .Version }}-amd64"
      - "ghcr.io/accessgate/accessgate-auth:{{ .Version }}-arm64"
  - name_template: "ghcr.io/accessgate/accessgate-auth:latest"
    image_templates:
      - "ghcr.io/accessgate/accessgate-auth:{{ .Version }}-amd64"
      - "ghcr.io/accessgate/accessgate-auth:{{ .Version }}-arm64"
  - name_template: "ghcr.io/accessgate/accessgate-proxy:{{ .Version }}"
    image_templates:
      - "ghcr.io/accessgate/accessgate-proxy:{{ .Version }}-amd64"
      - "ghcr.io/accessgate/accessgate-proxy:{{ .Version }}-arm64"
  - name_template: "ghcr.io/accessgate/accessgate-proxy:latest"
    image_templates:
      - "ghcr.io/accessgate/accessgate-proxy:{{ .Version }}-amd64"
      - "ghcr.io/accessgate/accessgate-proxy:{{ .Version }}-arm64"
  # Docker Hub mirrors of the same manifests (the per-arch digests are shared
  # with GHCR because each image is built once and tagged for both registries).
  - name_template: "docker.io/accessgate/accessgate-auth:{{ .Version }}"
    image_templates:
      - "docker.io/accessgate/accessgate-auth:{{ .Version }}-amd64"
      - "docker.io/accessgate/accessgate-auth:{{ .Version }}-arm64"
  - name_template: "docker.io/accessgate/accessgate-auth:latest"
    image_templates:
      - "docker.io/accessgate/accessgate-auth:{{ .Version }}-amd64"
      - "docker.io/accessgate/accessgate-auth:{{ .Version }}-arm64"
  - name_template: "docker.io/accessgate/accessgate-proxy:{{ .Version }}"
    image_templates:
      - "docker.io/accessgate/accessgate-proxy:{{ .Version }}-amd64"
      - "docker.io/accessgate/accessgate-proxy:{{ .Version }}-arm64"
  - name_template: "docker.io/accessgate/accessgate-proxy:latest"
    image_templates:
      - "docker.io/accessgate/accessgate-proxy:{{ .Version }}-amd64"
      - "docker.io/accessgate/accessgate-proxy:{{ .Version }}-arm64"

snapshot:
  version_template: "{{ incpatch .Version }}-next"
