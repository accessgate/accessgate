# accessgate-proxy example config (YAML).
# Use with CONFIG_PATH or PROXY_CONFIG when using a YAML-capable loader.
# For JSON loader use configs/proxy.example.json instead.

upstream_url: "https://example.com"
proxy_path_prefix: "/graphql"
require_auth: true
auth_url: "https://auth.example.com"
cookie_name: "__Host-ess_session"
http_port: "8081"
grpc_listen_addr: ""  # e.g. ":9091" to enable the optional proxy gRPC authz server; empty disables it
policy_engine: "wasm"
policy_bundle_path: ""
policy_fallback_allow: true
pipeline_plugins: []
plugins_manifest_dir: ""
plugins_manifest_strict: false  # when true, manifest discovery errors fail startup (fail-closed)
plugins_manifest_public_key_path: ""  # PEM public key for manifest signature verification
admin_secret: ""  # set via ADMIN_SECRET env var; empty disables /admin
bundle_public_key_path: ""  # PEM public key for policy bundle signature verification
allow_private_upstreams: false  # never enable in production; local dev only
headers_user_id_claim: "sub"
headers_email_claim: "email"
headers_name_claim: "name"
headers_preferred_username_claim: "preferred_username"
headers_roles_claim: "realm_access.roles"
headers_groups_claim: "groups"
headers_tenant_id_claim: ""
headers_admin_role: "admin"
